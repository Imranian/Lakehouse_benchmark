kafka:
  topic: sensor_topic
  bootstrap_servers: localhost:9092

stream:
  event_rate: 100
  sensors: 1000

workloads:
  low:
    mode: constant
    event_rate: 100
    duration_seconds: 150
    sensors: 1000
  medium:
    mode: constant
    event_rate: 1000
    duration_seconds: 150
    sensors: 1000
  high:
    mode: constant
    event_rate: 5000
    duration_seconds: 150
    sensors: 1000
  burst:
    mode: burst
    sensors: 1000
    phase_rates:
      - 100
      - 2000
      - 100
    phase_durations:
      - 45
      - 60
      - 45

paths:
  delta_table: file:///home/imran/lakehouse_benchmark/data/lakehouse/delta
  hudi_table: file:///home/imran/lakehouse_benchmark/data/lakehouse/hudi
  iceberg_warehouse: file:///home/imran/lakehouse_benchmark/data/lakehouse/iceberg_warehouse
  delta_checkpoint: file:///home/imran/lakehouse_benchmark/data/checkpoints/delta
  hudi_checkpoint: file:///home/imran/lakehouse_benchmark/data/checkpoints/hudi
  iceberg_checkpoint: file:///home/imran/lakehouse_benchmark/data/checkpoints/iceberg

hudi:
  table_name: sensor_hudi
  table_type: COPY_ON_WRITE

iceberg:
  namespace: benchmark
  table_name: sensor_iceberg

benchmark:
  duration_seconds: 120
  query_runs: 3
  small_file_threshold_mb: 16

compaction:
  target_file_count: 4

metrics:
  output_dir: /home/imran/lakehouse_benchmark/metrics/results
  delta_ingestion: /home/imran/lakehouse_benchmark/metrics/results/delta_ingestion.json
  hudi_ingestion: /home/imran/lakehouse_benchmark/metrics/results/hudi_ingestion.json
  iceberg_ingestion: /home/imran/lakehouse_benchmark/metrics/results/iceberg_ingestion.json
  delta_compaction: /home/imran/lakehouse_benchmark/metrics/results/delta_compaction.json
  hudi_compaction: /home/imran/lakehouse_benchmark/metrics/results/hudi_compaction.json
  iceberg_compaction: /home/imran/lakehouse_benchmark/metrics/results/iceberg_compaction.json
